apiVersion: v1
kind: Secret
metadata:
  name: nexus-credentials
  namespace: argo
  labels:
    app.kubernetes.io/name: nexus-credentials
    app.kubernetes.io/version: "0.0.1"
    app.kubernetes.io/part-of: pipeline
  annotations:
    app.kubernetes.io/description: "nexus3 制品仓库账号密码，供 push-image-nexus3 模板通过 secretKeyRef 注入为 NEXUS_USERNAME / NEXUS_PASSWORD。"
type: Opaque
# stringData：明文写入，kubectl apply 时自动 base64 编码存入 etcd。
# 当前值为 nexus3 初始化账号 admin/admin（见 环境搭建/制品仓库/nexus3搭建.md）。
# ⚠️ 明文凭据会进入 git 历史，仅适合学习仓库；生产请：
#   1) 为制品上传单独建账号（勿用高权限的 admin）；
#   2) 用 SealedSecrets / External Secrets / SOPS 等加密方案管理，勿提交明文密码。
stringData:
  username: admin
  password: admin
