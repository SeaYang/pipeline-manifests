apiVersion: v1
kind: Secret
metadata:
  name: nexus-registry-credentials
  namespace: argo
  labels:
    app.kubernetes.io/name: nexus-registry-credentials
    app.kubernetes.io/version: "0.0.1"
    app.kubernetes.io/part-of: pipeline
  annotations:
    app.kubernetes.io/description: "拉取私有镜像用的 imagePullSecret（type=kubernetes.io/dockerconfigjson）。与 nexus-credentials（Opaque，供 push 模板 secretKeyRef 注入）职责分离：那个用于上传，这个用于 k8s Pod 拉取。当前值 admin/admin（见 环境搭建/制品仓库/nexus3搭建.md）。"
type: kubernetes.io/dockerconfigjson
# stringData：明文 JSON，kubectl apply 时自动 base64 编码存入 data[".dockerconfigjson"]。
# auth 字段 = base64("admin:admin") = YWRtaW46YWRtaW4=（docker config 规范要求 user:pass 的 base64）。
# ⚠️ 这是 Nexus3 3.77+ 的 "null://" bearer realm bug 规避方案：在 Nexus 仓库设置里开启
#    "Force basic authentication"，让 docker 走 Basic 认证（本 secret 提供），从而绕开坏掉的 bearer token 流程。
# ⚠️ 明文凭据会进入 git 历史，仅适合学习仓库；生产请用 SealedSecrets / External Secrets / SOPS 加密管理。
# ⚠️ server（192.168.10.134:8082）需与上游 push 的镜像仓库地址一致；换仓库时同步改这里。
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "192.168.10.134:8082": {
          "username": "admin",
          "password": "admin",
          "auth": "YWRtaW46YWRtaW4="
        }
      }
    }
